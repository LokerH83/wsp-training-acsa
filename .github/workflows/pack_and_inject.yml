name: Pack and Inject Entities

on:
  workflow_dispatch:
  push:
    branches:
      - add-unpacked-solution

jobs:
  pack-inject:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy generated entity artifacts into solution
        shell: pwsh
        run: |
          $src = "${{ github.workspace }}\artifacts\entities"
          $dst = "${{ github.workspace }}\src\solution\Entities"
          if(Test-Path $src) {
            New-Item -ItemType Directory -Path $dst -Force | Out-Null
            Copy-Item -Path (Join-Path $src '*') -Destination $dst -Recurse -Force
            Write-Output "Copied entity artifacts to solution Entities folder"
          } else { Write-Output "No artifacts/entities folder found; skipping copy" }

      - name: Install Power Platform tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Pack solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: src/solution
          solution-file: exports/WSPTrainingManagementSystem_with_entities_CI.zip
          solution-type: Unmanaged

      - name: Authenticate and import solution into sandbox
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENVIRONMENT }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: exports/WSPTrainingManagementSystem_with_entities_CI.zip
          force-overwrite: true
          publish-changes: true

      - name: Upload packed solution artifact
        uses: actions/upload-artifact@v4
        with:
          name: packed-solution
          path: exports/WSPTrainingManagementSystem_with_entities_CI.zip
