name: Import Verified Power Apps Export

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  import-solution:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize diagnostics
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exports = Join-Path $env:GITHUB_WORKSPACE "exports"
          New-Item -ItemType Directory -Path $exports -Force | Out-Null

          $log = Join-Path $exports "powerplatform-import.log"
          "Power Platform import diagnostics" | Set-Content -Path $log -Encoding utf8
          "run_id=$env:GITHUB_RUN_ID" | Add-Content -Path $log
          "run_attempt=$env:GITHUB_RUN_ATTEMPT" | Add-Content -Path $log
          "sha=$env:GITHUB_SHA" | Add-Content -Path $log
          "workspace=$env:GITHUB_WORKSPACE" | Add-Content -Path $log
          "runner_os=$env:RUNNER_OS" | Add-Content -Path $log
          "initialized=$(Get-Date -Format o)" | Add-Content -Path $log

          "POWERPLATFORM_IMPORT_LOG=$log" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Diagnostics initialized at $log"

      - name: Install PAC CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $log = $env:POWERPLATFORM_IMPORT_LOG
          "===== Install PAC CLI =====" | Tee-Object -FilePath $log -Append

          dotnet --info 2>&1 | Tee-Object -FilePath $log -Append
          $installOutput = Join-Path $env:RUNNER_TEMP "pac-tool-install.log"
          dotnet tool update --global Microsoft.PowerApps.CLI.Tool *> $installOutput
          $exitCode = $LASTEXITCODE

          if(Test-Path $installOutput) {
            Get-Content $installOutput | Tee-Object -FilePath $log -Append
          }
          "dotnet_tool_exit_code=$exitCode" | Tee-Object -FilePath $log -Append

          if($exitCode -ne 0) {
            throw "Failed to install or update Microsoft.PowerApps.CLI.Tool. See powerplatform-import.log artifact."
          }

          $dotnetTools = Join-Path $env:USERPROFILE ".dotnet\tools"
          $dotnetTools | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "dotnet_tools_path=$dotnetTools" | Tee-Object -FilePath $log -Append

      - name: Resolve PAC CLI path
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $log = $env:POWERPLATFORM_IMPORT_LOG
          "===== Resolve PAC CLI path =====" | Tee-Object -FilePath $log -Append

          $candidates = @(
            (Join-Path $env:USERPROFILE ".dotnet\tools\pac.exe"),
            (Join-Path $env:USERPROFILE ".dotnet\tools\pac.cmd")
          )

          $command = Get-Command pac -ErrorAction SilentlyContinue
          if($command) {
            $candidates += $command.Source
          }

          $pac = $candidates |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -First 1

          if(-not $pac) {
            "PAC CLI candidates checked:" | Tee-Object -FilePath $log -Append
            $candidates | ForEach-Object { " - $_" | Tee-Object -FilePath $log -Append }
            throw "PAC CLI could not be resolved after dotnet tool install."
          }

          "PAC_EXE=$pac" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "pac_path=$pac" | Tee-Object -FilePath $log -Append
          & $pac help 2>&1 | Tee-Object -FilePath $log -Append

      - name: Confirm solution export exists
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $log = $env:POWERPLATFORM_IMPORT_LOG
          "===== Confirm solution export exists =====" | Tee-Object -FilePath $log -Append

          $solution = Join-Path $env:GITHUB_WORKSPACE "exports\WSPTrainingManagementSystem_complete_solution.zip"
          if(-not (Test-Path $solution)) {
            "Verified Power Apps export was not found: $solution" | Tee-Object -FilePath $log -Append
            throw "Verified Power Apps export was not found."
          }

          $item = Get-Item $solution
          "solution_path=$solution" | Tee-Object -FilePath $log -Append
          "solution_size_bytes=$($item.Length)" | Tee-Object -FilePath $log -Append

      - name: Upload verified solution artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-power-apps-export
          path: exports/WSPTrainingManagementSystem_complete_solution.zip

      - name: Authenticate and import with PAC CLI
        shell: pwsh
        env:
          PP_ENVIRONMENT: ${{ secrets.PP_ENVIRONMENT }}
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
        run: |
          $ErrorActionPreference = "Continue"
          $log = $env:POWERPLATFORM_IMPORT_LOG
          $solution = Join-Path $env:GITHUB_WORKSPACE "exports\WSPTrainingManagementSystem_complete_solution.zip"
          $pac = $env:PAC_EXE

          function Write-Log {
            param([string]$Message)
            $Message | Tee-Object -FilePath $log -Append
          }

          function Format-PacArgs {
            param([string[]]$Arguments)
            $safeArguments = @()
            for($i = 0; $i -lt $Arguments.Count; $i++) {
              if($Arguments[$i] -eq "--clientSecret") {
                $safeArguments += $Arguments[$i]
                if($i + 1 -lt $Arguments.Count) {
                  $safeArguments += "***"
                  $i++
                }
              } else {
                $safeArguments += $Arguments[$i]
              }
            }
            return "pac $($safeArguments -join ' ')"
          }

          function Invoke-Pac {
            param([string[]]$Arguments)
            $tmp = Join-Path $env:RUNNER_TEMP "pac-step-output.log"
            if(Test-Path $tmp) { Remove-Item $tmp -Force }

            & $pac @Arguments *> $tmp
            $exitCode = $LASTEXITCODE

            if(Test-Path $tmp) {
              Get-Content $tmp | Tee-Object -FilePath $log -Append
            }

            if($null -eq $exitCode) {
              if($?) { $exitCode = 0 } else { $exitCode = 1 }
            }

            return [int]$exitCode
          }

          function Run-Pac {
            param([string]$Label, [string[]]$Arguments)
            Write-Log "===== $Label ====="
            Write-Log (Format-PacArgs $Arguments)
            $exitCode = Invoke-Pac $Arguments
            Write-Log "exit_code=$exitCode"
            if($exitCode -ne 0) {
              throw "$Label failed with exit code $exitCode. See powerplatform-import.log artifact."
            }
          }

          function Try-Pac {
            param([string]$Label, [string[]]$Arguments)
            Write-Log "===== $Label ====="
            Write-Log (Format-PacArgs $Arguments)
            $exitCode = Invoke-Pac $Arguments
            Write-Log "exit_code=$exitCode"
            return $exitCode
          }

          "===== Authenticate and import with PAC CLI =====" | Tee-Object -FilePath $log -Append
          if(-not $pac -or -not (Test-Path $pac)) {
            Write-Log "PAC_EXE was not resolved or does not exist: $pac"
            throw "PAC_EXE was not resolved or does not exist."
          }

          Write-Log "pac_path=$pac"
          & $pac help 2>&1 | Tee-Object -FilePath $log -Append
          Write-Log "PP_ENVIRONMENT=$env:PP_ENVIRONMENT"
          Write-Log "PP_CLIENT_ID present=$([bool]$env:PP_CLIENT_ID)"
          Write-Log "PP_TENANT_ID present=$([bool]$env:PP_TENANT_ID)"
          Write-Log "PP_CLIENT_SECRET present=$([bool]$env:PP_CLIENT_SECRET)"

          $missingSecrets = @()
          if(-not $env:PP_ENVIRONMENT) { $missingSecrets += "PP_ENVIRONMENT" }
          if(-not $env:PP_CLIENT_ID) { $missingSecrets += "PP_CLIENT_ID" }
          if(-not $env:PP_CLIENT_SECRET) { $missingSecrets += "PP_CLIENT_SECRET" }
          if(-not $env:PP_TENANT_ID) { $missingSecrets += "PP_TENANT_ID" }
          if($missingSecrets.Count -gt 0) {
            Write-Log "Missing required secrets: $($missingSecrets -join ', ')"
            throw "One or more required Power Platform secrets are missing."
          }

          $authExit = Try-Pac "auth create with environment" @(
            "auth", "create",
            "--name", "github-actions-acsa",
            "--environment", $env:PP_ENVIRONMENT,
            "--applicationId", $env:PP_CLIENT_ID,
            "--clientSecret", $env:PP_CLIENT_SECRET,
            "--tenant", $env:PP_TENANT_ID
          )

          if($authExit -ne 0) {
            Write-Log "Environment auth failed; retrying with --url."
            $authExit = Try-Pac "auth create with url" @(
              "auth", "create",
              "--name", "github-actions-acsa-url",
              "--url", $env:PP_ENVIRONMENT,
              "--applicationId", $env:PP_CLIENT_ID,
              "--clientSecret", $env:PP_CLIENT_SECRET,
              "--tenant", $env:PP_TENANT_ID
            )
          }

          if($authExit -ne 0) {
            throw "Power Platform authentication failed with exit code $authExit. See powerplatform-import.log artifact."
          }

          Run-Pac "auth who" @("auth", "who")

          Run-Pac "solution import" @(
            "solution", "import",
            "--path", $solution,
            "--environment", $env:PP_ENVIRONMENT,
            "--force-overwrite",
            "--publish-changes",
            "--max-async-wait-time", "30"
          )

      - name: Upload Power Platform import log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powerplatform-import-log
          path: exports/powerplatform-import.log
          if-no-files-found: error
