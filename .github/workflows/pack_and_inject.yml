name: Pack Power Apps Solution

on:
  workflow_dispatch:
  push:
    branches:
      - add-unpacked-solution

jobs:
  pack-inject:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Pack solution
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-folder: src/solution
          solution-file: exports/WSPTrainingManagementSystem_with_entities_CI.zip
          solution-type: Unmanaged

      - name: Authenticate and import solution into sandbox
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENVIRONMENT }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: exports/WSPTrainingManagementSystem_with_entities_CI.zip
          force-overwrite: true
          publish-changes: true

      - name: Upload packed solution artifact
        uses: actions/upload-artifact@v4
        with:
          name: packed-solution
          path: exports/WSPTrainingManagementSystem_with_entities_CI.zip
