name: Import Verified Power Apps Export

on:
  workflow_dispatch:
  push:
    branches:
      - add-unpacked-solution

jobs:
  import-solution:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Confirm solution export exists
        shell: pwsh
        run: |
          $solution = "${{ github.workspace }}\exports\WSPTrainingManagementSystem_complete_solution.zip"
          if(-not (Test-Path $solution)) {
            Write-Error "Verified Power Apps export was not found: $solution"
            exit 1
          }
          Write-Output "Using verified Power Apps export: $solution"

      - name: Upload verified solution artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-power-apps-export
          path: exports/WSPTrainingManagementSystem_complete_solution.zip

      - name: Authenticate and import with PAC CLI
        shell: pwsh
        env:
          PP_ENVIRONMENT: ${{ secrets.PP_ENVIRONMENT }}
          PP_CLIENT_ID: ${{ secrets.PP_CLIENT_ID }}
          PP_CLIENT_SECRET: ${{ secrets.PP_CLIENT_SECRET }}
          PP_TENANT_ID: ${{ secrets.PP_TENANT_ID }}
        run: |
          $ErrorActionPreference = "Continue"
          $log = "${{ github.workspace }}\exports\powerplatform-import.log"
          $solution = "${{ github.workspace }}\exports\WSPTrainingManagementSystem_complete_solution.zip"

          function Format-PacArgs {
            param([string[]]$Arguments)
            $safeArguments = @()
            for($i = 0; $i -lt $Arguments.Count; $i++) {
              if($Arguments[$i] -eq "--clientSecret") {
                $safeArguments += $Arguments[$i]
                if($i + 1 -lt $Arguments.Count) {
                  $safeArguments += "***"
                  $i++
                }
              } else {
                $safeArguments += $Arguments[$i]
              }
            }
            return "pac $($safeArguments -join ' ')"
          }

          function Invoke-Pac {
            param([string[]]$Arguments)
            & pac @Arguments 2>&1 | Tee-Object -FilePath $log -Append
            return $LASTEXITCODE
          }

          function Run-Pac {
            param([string]$Label, [string[]]$Arguments)
            "===== $Label =====" | Tee-Object -FilePath $log -Append
            Format-PacArgs $Arguments | Tee-Object -FilePath $log -Append
            $exitCode = Invoke-Pac $Arguments
            "exit_code=$exitCode" | Tee-Object -FilePath $log -Append
            if($exitCode -ne 0) {
              throw "$Label failed with exit code $exitCode. See powerplatform-import.log artifact."
            }
          }

          function Try-Pac {
            param([string]$Label, [string[]]$Arguments)
            "===== $Label =====" | Tee-Object -FilePath $log -Append
            Format-PacArgs $Arguments | Tee-Object -FilePath $log -Append
            $exitCode = Invoke-Pac $Arguments
            "exit_code=$exitCode" | Tee-Object -FilePath $log -Append
            return $exitCode
          }

          "PP_ENVIRONMENT=$env:PP_ENVIRONMENT" | Tee-Object -FilePath $log -Append
          "PP_CLIENT_ID present=$([bool]$env:PP_CLIENT_ID)" | Tee-Object -FilePath $log -Append
          "PP_TENANT_ID present=$([bool]$env:PP_TENANT_ID)" | Tee-Object -FilePath $log -Append
          "PP_CLIENT_SECRET present=$([bool]$env:PP_CLIENT_SECRET)" | Tee-Object -FilePath $log -Append

          $authExit = Try-Pac "auth create with environment" @(
            "auth", "create",
            "--name", "github-actions-acsa",
            "--environment", $env:PP_ENVIRONMENT,
            "--applicationId", $env:PP_CLIENT_ID,
            "--clientSecret", $env:PP_CLIENT_SECRET,
            "--tenant", $env:PP_TENANT_ID
          )

          if($authExit -ne 0) {
            "Environment auth failed; retrying with --url." | Tee-Object -FilePath $log -Append
            $authExit = Try-Pac "auth create with url" @(
              "auth", "create",
              "--name", "github-actions-acsa-url",
              "--url", $env:PP_ENVIRONMENT,
              "--applicationId", $env:PP_CLIENT_ID,
              "--clientSecret", $env:PP_CLIENT_SECRET,
              "--tenant", $env:PP_TENANT_ID
            )
          }

          if($authExit -ne 0) {
            throw "Power Platform authentication failed with exit code $authExit. See powerplatform-import.log artifact."
          }

          Run-Pac "auth who" @("auth", "who")

          Run-Pac "solution import" @(
            "solution", "import",
            "--path", $solution,
            "--environment", $env:PP_ENVIRONMENT,
            "--force-overwrite",
            "--publish-changes",
            "--max-async-wait-time", "30"
          )

      - name: Upload Power Platform import log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powerplatform-import-log
          path: exports/powerplatform-import.log
