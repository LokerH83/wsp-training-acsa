name: Import Verified Power Apps Export

on:
  workflow_dispatch:
  push:
    branches:
      - add-unpacked-solution

jobs:
  import-solution:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Power Platform tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Confirm solution export exists
        shell: pwsh
        run: |
          $solution = "${{ github.workspace }}\exports\WSPTrainingManagementSystem_complete_solution.zip"
          if(-not (Test-Path $solution)) {
            Write-Error "Verified Power Apps export was not found: $solution"
            exit 1
          }
          Write-Output "Using verified Power Apps export: $solution"

      - name: Import verified solution into sandbox
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.PP_ENVIRONMENT }}
          app-id: ${{ secrets.PP_CLIENT_ID }}
          client-secret: ${{ secrets.PP_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PP_TENANT_ID }}
          solution-file: exports/WSPTrainingManagementSystem_complete_solution.zip
          force-overwrite: true
          publish-changes: true

      - name: Upload imported solution artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-power-apps-export
          path: exports/WSPTrainingManagementSystem_complete_solution.zip
